<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>john 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,700;1,400&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0c1018;color:#eef2f8;font-family:'Jost',sans-serif}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 55% 45% at 8% 90%,rgba(200,155,15,.2) 0%,transparent 60%),
             radial-gradient(ellipse 55% 45% at 92% 10%,rgba(25,75,175,.28) 0%,transparent 60%)}

/* ── SHARED PETAL ENGINE ── */
.flower{position:fixed;pointer-events:none;z-index:1}
.flower.bl{bottom:-16px;left:-16px}
.flower.br{bottom:-16px;right:-16px;transform:scaleX(-1)}
/* cherry: position so center is visible at top-right */
.flower.tr{top:-16px;right:-16px;transform:scaleX(-1) rotate(180deg)}

.petal{position:absolute;bottom:0;left:50%;transform-origin:50% 100%;
  transform:translateX(-50%) rotate(var(--r)) scaleY(0);
  animation:bloom .6s cubic-bezier(.4,0,.2,1) forwards var(--d);opacity:0}
.petal::after{content:'';position:absolute;top:15%;left:20%;width:35%;height:45%;border-radius:50%;background:rgba(255,255,255,.2)}
.center{position:absolute;bottom:0;left:50%;border-radius:50%;transform:translateX(-50%) scale(0);animation:pop .3s ease forwards var(--cd)}

/* cherry blossom petals are round, radiate from center — different positioning */
.blossom{position:fixed;top:clamp(20px,6vw,50px);right:clamp(20px,6vw,50px);width:clamp(60px,14vw,90px);height:clamp(60px,14vw,90px);pointer-events:none;z-index:1}
.bp{position:absolute;top:50%;left:50%;transform-origin:50% 150%;
  transform:translate(-50%,-50%) rotate(var(--r)) translateY(clamp(-22px,-5.5vw,-14px)) scaleX(0) scaleY(0);
  width:clamp(14px,3.5vw,22px);height:clamp(14px,3.5vw,22px);border-radius:50%;
  background:radial-gradient(circle at 40% 38%,#fcd8e8,#e890b8);
  animation:bpBloom .45s ease forwards var(--d)}
.bp::after{content:'';position:absolute;top:18%;left:18%;width:36%;height:36%;border-radius:50%;background:rgba(255,255,255,.3)}
.bc{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  width:clamp(10px,2.5vw,16px);height:clamp(10px,2.5vw,16px);border-radius:50%;
  background:radial-gradient(circle at 38% 36%,#ffe878,#e8a820);
  animation:pop .3s ease forwards 1.3s}

@keyframes bloom{0%{transform:translateX(-50%) rotate(var(--r)) scaleY(0);opacity:0}65%{transform:translateX(-50%) rotate(var(--r)) scaleY(1.06);opacity:1}100%{transform:translateX(-50%) rotate(var(--r)) scaleY(1);opacity:1}}
@keyframes bpBloom{0%{transform:translate(-50%,-50%) rotate(var(--r)) translateY(clamp(-22px,-5.5vw,-14px)) scale(0);opacity:0}70%{transform:translate(-50%,-50%) rotate(var(--r)) translateY(clamp(-22px,-5.5vw,-14px)) scale(1.1);opacity:1}100%{transform:translate(-50%,-50%) rotate(var(--r)) translateY(clamp(-22px,-5.5vw,-14px)) scale(1);opacity:1}}
@keyframes pop{0%{transform:translate(-50%,-50%) scale(0)}70%{transform:translate(-50%,-50%) scale(1.2)}100%{transform:translate(-50%,-50%) scale(1)}}

/* ── CONTENT ── */
.scene{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(40px,8vh,60px) clamp(24px,6vw,40px);text-align:center;z-index:2}
.tag{font-size:clamp(10px,2.5vw,12px);letter-spacing:.45em;text-transform:uppercase;color:rgba(170,190,235,.5);font-weight:300;margin-bottom:14px;opacity:0;animation:fadeUp .7s .2s ease forwards}
.name-first{font-family:'Libre Baskerville',serif;font-size:clamp(40px,11vw,84px);font-weight:700;color:#eef2f8;display:block;line-height:1;opacity:0;animation:fadeUp .9s .5s ease forwards}
.name-last{font-family:'Libre Baskerville',serif;font-size:clamp(26px,7vw,54px);font-weight:400;font-style:italic;background:linear-gradient(90deg,#f0cc30,#4878e0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;opacity:0;animation:fadeUp .85s .55s ease forwards;letter-spacing:.04em}
.rule{width:0;height:2px;border-radius:1px;background:linear-gradient(to right,#e8c030,#4878e0);animation:expandW .8s 1.05s ease forwards;margin:18px auto}
.message{font-family:'Libre Baskerville',serif;font-size:clamp(16px,4.5vw,22px);font-style:italic;color:rgba(238,242,248,.78);line-height:1.85;max-width:430px;opacity:0;animation:fadeUp .8s 1.4s ease forwards;padding:0 10px}
.back{position:fixed;top:20px;left:20px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(72,120,224,.4);text-decoration:none;transition:color .25s;opacity:0;animation:fadeUp .5s .1s ease forwards}
.back:hover{color:rgba(72,120,224,.85)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes expandW{from{width:0}to{width:min(240px,55vw)}}
</style>
</head>
<body>
<!-- yellow tulip bottom-left -->
<div class="flower bl" style="width:92px;height:98px">
  <div class="petal" style="--r:-26deg;--d:.5s;width:17px;height:47px;border-radius:50% 50% 30% 30%/55% 55% 45% 45%;background:linear-gradient(to top,#c08810,#f0cc38)"></div>
  <div class="petal" style="--r:0deg;  --d:.62s;width:19px;height:53px;border-radius:50% 50% 30% 30%/55% 55% 45% 45%;background:linear-gradient(to top,#d09818,#f8d845)"></div>
  <div class="petal" style="--r:26deg; --d:.55s;width:17px;height:47px;border-radius:50% 50% 30% 30%/55% 55% 45% 45%;background:linear-gradient(to top,#c08810,#f0cc38)"></div>
  <div class="center" style="width:9px;height:9px;background:#805008;--cd:.95s"></div>
</div>
<!-- blue tulip bottom-right -->
<div class="flower br" style="width:92px;height:98px">
  <div class="petal" style="--r:-26deg;--d:.5s;width:17px;height:47px;border-radius:50% 50% 30% 30%/55% 55% 45% 45%;background:linear-gradient(to top,#1830a0,#4878e0)"></div>
  <div class="petal" style="--r:0deg;  --d:.62s;width:19px;height:53px;border-radius:50% 50% 30% 30%/55% 55% 45% 45%;background:linear-gradient(to top,#2040b8,#5890f2)"></div>
  <div class="petal" style="--r:26deg; --d:.55s;width:17px;height:47px;border-radius:50% 50% 30% 30%/55% 55% 45% 45%;background:linear-gradient(to top,#1830a0,#4878e0)"></div>
  <div class="center" style="width:9px;height:9px;background:#80b0ff;box-shadow:0 0 8px rgba(128,176,255,.7);--cd:.95s"></div>
</div>
<!-- cherry blossom top-right -->
<div class="blossom">
  <div class="bp" style="--r:0deg;  --d:.7s"></div>
  <div class="bp" style="--r:72deg; --d:.8s"></div>
  <div class="bp" style="--r:144deg;--d:.75s"></div>
  <div class="bp" style="--r:216deg;--d:.85s"></div>
  <div class="bp" style="--r:288deg;--d:.78s"></div>
  <div class="bc"></div>
</div>

<a class="back" href="index.html">← back</a>
<div class="scene">
  <div class="tag">for john</div>
  <span class="name-first">John Rodulf</span>
  <span class="name-last">Pomida</span>
  <div class="rule"></div>
  <div class="message">"You kept moving forward even on hard days. Strong work."</div>
</div>
</body>
</html>
