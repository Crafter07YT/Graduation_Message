<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>jay-ar 🌷</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Syne:wght@400;700;800&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#141210;color:#f0eaf8;font-family:'Jost',sans-serif}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 65% 50% at 20% 90%,rgba(100,88,70,.4) 0%,transparent 65%), radial-gradient(ellipse 50% 40% at 80% 15%,rgba(70,62,50,.35) 0%,transparent 60%)}

.flower{position:fixed;pointer-events:none;z-index:1}
.flower.bl{bottom:-16px;left:-16px}
.flower.br{bottom:-16px;right:-16px;transform:scaleX(-1)}
.petal{position:absolute;bottom:0;left:50%;transform-origin:50% 100%;transform:translateX(-50%) rotate(var(--r)) scaleY(0);animation:bloom .6s cubic-bezier(.4,0,.2,1) forwards var(--d);opacity:0}
.petal::after{content:'';position:absolute;top:15%;left:20%;width:35%;height:45%;border-radius:50%;background:rgba(255,255,255,.18)}
.center{position:absolute;bottom:0;left:50%;border-radius:50%;transform:translateX(-50%) scale(0);animation:pop .3s ease forwards var(--cd)}
@keyframes bloom{0%{transform:translateX(-50%) rotate(var(--r)) scaleY(0);opacity:0}65%{transform:translateX(-50%) rotate(var(--r)) scaleY(1.06);opacity:1}100%{transform:translateX(-50%) rotate(var(--r)) scaleY(1);opacity:1}}
@keyframes pop{0%{transform:translateX(-50%) scale(0)}70%{transform:translateX(-50%) scale(1.2)}100%{transform:translateX(-50%) scale(1)}}

.scene{position:fixed;inset:0;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:clamp(40px,8vh,60px) clamp(30px,8vw,70px);z-index:2}
.tag{font-size:clamp(10px,2.5vw,12px);letter-spacing:.45em;text-transform:uppercase;color:rgba(180,165,140,.5);font-weight:300;margin-bottom:18px;opacity:0;animation:fadeUp .7s .15s ease forwards}
.name-first{font-family:'Playfair Display', serif;font-size:clamp(50px,14vw,110px);font-weight:700;color:#f0eaf8;display:block;line-height:.95;opacity:0;animation:slideIn .9s .45s ease forwards}
.name-middle{font-family:'Playfair Display', serif;font-size:clamp(15px,3.8vw,26px);font-weight:300;font-style:italic;color:rgba(220,210,240,.4);display:block;letter-spacing:.06em;opacity:0;animation:slideIn .7s .6s ease forwards}
.name-last{font-family:'Playfair Display', serif;font-size:clamp(24px,6.5vw,52px);font-weight:400;font-style:italic;color:rgba(200,188,165,.65);display:block;line-height:1.05;opacity:0;animation:slideIn .8s .52s ease forwards}
.rule{width:0;height:1px;background:linear-gradient(to right,rgba(180,165,140,.6),transparent);animation:expandW .8s 1.05s ease forwards;margin:20px 0}
.message{font-family:'Playfair Display', serif;font-size:clamp(16px,4.2vw,21px);font-style:italic;color:rgba(232,226,216,.75);line-height:1.85;max-width:440px;opacity:0;animation:fadeUp .8s 1.4s ease forwards}
.back{position:fixed;top:20px;left:20px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(180,165,140,.4);text-decoration:none;transition:color .25s;opacity:0;animation:fadeUp .5s .1s ease forwards}
.back:hover{color:rgba(180,165,140,.85)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes expandW{from{width:0}to{width:min(220px,52vw)}}
</style>
</head>
<body>

<div class="flower bl" style="width:92px;height:98px">
  <div class="petal" style="--r:-26deg;--d:.5s;width:16px;height:45px;border-radius:50% 50% 30% 30%/55% 55% 45% 45%;background:linear-gradient(to top,#7a6e58,#c8b890)"></div>
  <div class="petal" style="--r:0deg;  --d:.62s;width:18px;height:51px;border-radius:50% 50% 30% 30%/55% 55% 45% 45%;background:linear-gradient(to top,#8a7e65,#d8c8a0)"></div>
  <div class="petal" style="--r:26deg; --d:.55s;width:16px;height:45px;border-radius:50% 50% 30% 30%/55% 55% 45% 45%;background:linear-gradient(to top,#7a6e58,#c8b890)"></div>
  <div class="center" style="width:8px;height:8px;background:#e8dcc0;--cd:.95s"></div>
</div>
<div class="flower br" style="width:92px;height:98px">
  <div class="petal" style="--r:-26deg;--d:.5s;width:16px;height:45px;border-radius:50% 50% 30% 30%/55% 55% 45% 45%;background:linear-gradient(to top,#7a6e58,#c8b890)"></div>
  <div class="petal" style="--r:0deg;  --d:.62s;width:18px;height:51px;border-radius:50% 50% 30% 30%/55% 55% 45% 45%;background:linear-gradient(to top,#8a7e65,#d8c8a0)"></div>
  <div class="petal" style="--r:26deg; --d:.55s;width:16px;height:45px;border-radius:50% 50% 30% 30%/55% 55% 45% 45%;background:linear-gradient(to top,#7a6e58,#c8b890)"></div>
  <div class="center" style="width:8px;height:8px;background:#e8dcc0;--cd:.95s"></div>
</div>
<a class="back" href="index.html">← back</a>
<div class="scene">
  <div class="tag">for jay-ar</div>
  <span class="name-first">Jay-ar</span>
  <span class="name-middle">Asagra</span>
  <span class="name-last">Mirabete</span>
  <div class="rule"></div>
  <div class="message">"You pushed through every challenge. You earned this."</div>
</div>
</body>
</html>
