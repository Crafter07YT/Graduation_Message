<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>roxanne 🪷</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Jost:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#0c0608;color:#f2e8f5;font-family:'Jost',sans-serif}
body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 55% 48% at 12% 92%,rgba(100,45,20,.5) 0%,transparent 60%),
             radial-gradient(ellipse 55% 48% at 88% 10%,rgba(110,28,155,.42) 0%,transparent 60%)}

/* ── SHARED PETAL ENGINE ── */
.flower{position:fixed;pointer-events:none;z-index:1}
.flower.bl{bottom:-16px;left:-16px}
.flower.br{bottom:-16px;right:-16px;transform:scaleX(-1)}

.petal{position:absolute;bottom:0;left:50%;transform-origin:50% 100%;
  transform:translateX(-50%) rotate(var(--r)) scaleY(0);
  animation:bloom .6s cubic-bezier(.4,0,.2,1) forwards var(--d);opacity:0}
.petal::after{content:'';position:absolute;top:15%;left:20%;width:34%;height:44%;border-radius:50%;background:rgba(255,255,255,.18)}
.center{position:absolute;bottom:0;left:50%;border-radius:50%;transform:translateX(-50%) scale(0);animation:pop .3s ease forwards var(--cd)}

/* lotus outer: wide, cupped. inner: narrow, tall, upright */
.lo{width:clamp(17px,4.2vw,25px);height:clamp(30px,7.5vw,44px);border-radius:50% 50% 35% 35%/60% 60% 40% 40%}
.li{width:clamp(11px,2.7vw,16px);height:clamp(36px,9vw,54px);border-radius:50% 50% 30% 30%/60% 60% 40% 40%}

/* sunflower petals: narrow oval, many, radiate 360 */
/* sunflower center is the .flower container center (offset in middle of container) */
.sf-wrap{position:fixed;bottom:clamp(20px,6vw,50px);right:clamp(20px,6vw,50px);
  width:clamp(70px,16vw,110px);height:clamp(70px,16vw,110px);pointer-events:none;z-index:1}
.sp{position:absolute;top:50%;left:50%;
  transform-origin:50% 150%;
  transform:translate(-50%,-50%) rotate(var(--r)) translateY(clamp(-24px,-6vw,-16px)) scaleY(0);
  width:clamp(9px,2.2vw,14px);height:clamp(20px,5vw,30px);border-radius:50%;
  background:linear-gradient(to top,#b87010,#f0c030);
  animation:spBloom .4s ease forwards var(--d);opacity:0}
.sp::after{content:'';position:absolute;top:15%;left:20%;width:35%;height:45%;border-radius:50%;background:rgba(255,255,255,.22)}
.sc{position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:clamp(18px,4.5vw,28px);height:clamp(18px,4.5vw,28px);border-radius:50%;
  background:radial-gradient(circle at 38% 35%,#4a2800,#2a1400);
  box-shadow:inset 0 2px 4px rgba(0,0,0,.5);
  animation:sfPop .35s ease forwards 1.3s}

@keyframes bloom{0%{transform:translateX(-50%) rotate(var(--r)) scaleY(0);opacity:0}65%{transform:translateX(-50%) rotate(var(--r)) scaleY(1.06);opacity:1}100%{transform:translateX(-50%) rotate(var(--r)) scaleY(1);opacity:1}}
@keyframes spBloom{0%{transform:translate(-50%,-50%) rotate(var(--r)) translateY(clamp(-24px,-6vw,-16px)) scaleY(0);opacity:0}70%{transform:translate(-50%,-50%) rotate(var(--r)) translateY(clamp(-24px,-6vw,-16px)) scaleY(1.08);opacity:1}100%{transform:translate(-50%,-50%) rotate(var(--r)) translateY(clamp(-24px,-6vw,-16px)) scaleY(1);opacity:1}}
@keyframes pop{0%{transform:translateX(-50%) scale(0)}70%{transform:translateX(-50%) scale(1.2)}100%{transform:translateX(-50%) scale(1)}}
@keyframes sfPop{0%{transform:translate(-50%,-50%) scale(0)}70%{transform:translate(-50%,-50%) scale(1.15)}100%{transform:translate(-50%,-50%) scale(1)}}

/* ── CONTENT ── */
.scene{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(40px,8vh,60px) clamp(24px,6vw,40px);text-align:center;z-index:2}
.tag{font-size:clamp(10px,2.5vw,12px);letter-spacing:.45em;text-transform:uppercase;color:rgba(200,130,240,.45);font-weight:300;margin-bottom:14px;opacity:0;animation:fadeUp .7s .2s ease forwards}
.name-first{font-family:'DM Serif Display',serif;font-size:clamp(44px,12vw,90px);font-style:italic;color:#f2e8f5;display:block;line-height:1;opacity:0;animation:fadeUp .9s .5s ease forwards}
.name-last{font-family:'DM Serif Display',serif;font-size:clamp(24px,6.5vw,50px);color:rgba(200,130,240,.68);display:block;letter-spacing:.04em;opacity:0;animation:fadeUp .85s .55s ease forwards}
.rule{width:0;height:2px;border-radius:1px;background:linear-gradient(to right,rgba(150,75,30,.7),rgba(160,55,200,.7));animation:expandW .8s 1.05s ease forwards;margin:18px auto}
.message{font-family:'DM Serif Display',serif;font-size:clamp(16px,4.5vw,22px);font-style:italic;color:rgba(242,232,245,.78);line-height:1.85;max-width:400px;opacity:0;animation:fadeUp .8s 1.4s ease forwards;padding:0 10px}
.back{position:fixed;top:20px;left:20px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:rgba(180,90,220,.4);text-decoration:none;transition:color .25s;opacity:0;animation:fadeUp .5s .1s ease forwards}
.back:hover{color:rgba(180,90,220,.85)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes expandW{from{width:0}to{width:min(230px,52vw)}}
</style>
</head>
<body>

<!-- purple lotus BL: outer 5 + inner 3 petals -->
<div class="flower bl" style="width:104px;height:108px">
  <div class="petal lo" style="--r:-40deg;--d:.5s; background:linear-gradient(to top,#6a1060,#c038a0)"></div>
  <div class="petal lo" style="--r:-20deg;--d:.58s;background:linear-gradient(to top,#7a1870,#d048b8)"></div>
  <div class="petal lo" style="--r:0deg;  --d:.54s;background:linear-gradient(to top,#7a1870,#d048b8)"></div>
  <div class="petal lo" style="--r:20deg; --d:.62s;background:linear-gradient(to top,#7a1870,#d048b8)"></div>
  <div class="petal lo" style="--r:40deg; --d:.56s;background:linear-gradient(to top,#6a1060,#c038a0)"></div>
  <div class="petal li" style="--r:-18deg;--d:.75s;background:linear-gradient(to top,#9030b0,#e060d8)"></div>
  <div class="petal li" style="--r:0deg;  --d:.83s;background:linear-gradient(to top,#a038c0,#f070e8)"></div>
  <div class="petal li" style="--r:18deg; --d:.79s;background:linear-gradient(to top,#9030b0,#e060d8)"></div>
  <div class="center" style="width:10px;height:10px;background:radial-gradient(circle at 40% 38%,#ffe060,#d09020);--cd:1.05s"></div>
</div>

<!-- sunflower BR: 12 petals radiating from center -->
<div class="sf-wrap">
  <div class="sp" style="--r:0deg;  --d:.5s"></div>
  <div class="sp" style="--r:30deg; --d:.55s"></div>
  <div class="sp" style="--r:60deg; --d:.52s"></div>
  <div class="sp" style="--r:90deg; --d:.58s"></div>
  <div class="sp" style="--r:120deg;--d:.54s"></div>
  <div class="sp" style="--r:150deg;--d:.6s"></div>
  <div class="sp" style="--r:180deg;--d:.56s"></div>
  <div class="sp" style="--r:210deg;--d:.62s"></div>
  <div class="sp" style="--r:240deg;--d:.58s"></div>
  <div class="sp" style="--r:270deg;--d:.64s"></div>
  <div class="sp" style="--r:300deg;--d:.6s"></div>
  <div class="sp" style="--r:330deg;--d:.66s"></div>
  <div class="sc"></div>
</div>

<a class="back" href="index.html">← back</a>
<div class="scene">
  <div class="tag">for roxanne</div>
  <span class="name-first">Roxanne</span>
  <span class="name-last">Maquiling</span>
  <div class="rule"></div>
  <div class="message">"You turned effort into results. Be proud."</div>
</div>
</body>
</html>
